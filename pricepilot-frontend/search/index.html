<!-- PricePilot — Week 1 Build -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - PricePilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="min-h-screen bg-[#f8f7ff] text-gray-950">
  <!-- App nav -->
  <nav class="border-b border-gray-200 bg-white/85 backdrop-blur-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">
      <a href="../index.html"><img src="../image.png" alt="PricePilot Logo" class="h-10 w-auto"></a>
      <div class="flex gap-4 text-sm font-semibold text-gray-500">
        <a href="../alerts/index.html" class="hover:text-violet-600">Alerts</a>
        <a href="../dashboard/index.html" class="hover:text-violet-600">Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- Search app -->
  <main class="mx-auto max-w-5xl px-5 py-14">
    <section class="fade-up rounded-[2rem] border border-white bg-white p-6 shadow-2xl shadow-violet-950/10 sm:p-10">
      <p class="text-sm font-bold text-violet-600">Search app</p>
      <h1 class="mt-3 text-4xl font-extrabold tracking-[-0.04em] sm:text-5xl">Find the real price before checkout.</h1>
      <form action="index.html" class="mt-8 rounded-3xl border border-gray-200 bg-gray-50 p-3 shadow-inner">
        <label for="search" class="sr-only">Search products</label>
        <input id="search" name="q" type="search" placeholder="Search products..." class="h-16 w-full rounded-2xl bg-white px-5 text-lg font-semibold outline-none transition focus:ring-4 focus:ring-violet-100">
      </form>
      <div class="mt-6">
        <p class="text-sm font-bold text-gray-400">Popular:</p>
        <div class="mt-3 flex flex-wrap gap-3">
          <a href="index.html?q=iphone-16" class="chip">iPhone 16</a>
          <a href="index.html?q=nike-air-max" class="chip">Nike Air Max</a>
          <a href="index.html?q=dolo-650" class="chip">Dolo 650</a>
          <a href="index.html?q=boat-rockerz" class="chip">Boat Airdopes</a>
        </div>
      </div>
    </section>

    <!-- Results preview -->
    <section class="fade-up mt-10 rounded-[2rem] border border-gray-200 bg-white p-6 shadow-xl shadow-violet-950/5 sm:p-8">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="text-sm font-bold text-gray-400">Results for</p>
          <h2 class="text-3xl font-extrabold tracking-[-0.03em]">boAt Rockerz 450</h2>
        </div>
        <a href="../product/boat-rockerz-450/index.html" class="ripple rounded-full bg-violet-600 px-5 py-3 text-sm font-bold text-white transition-all duration-200 hover:bg-violet-700 active:scale-[0.97]">View Product →</a>
      </div>
      <div class="mt-6 space-y-3">
        <div class="result-row"><span>Amazon</span><strong>₹1348</strong></div>
        <div class="result-row"><span>Flipkart</span><strong>₹1389</strong></div>
        <div class="result-row best"><span>Myntra</span><strong>₹1276 ✓</strong></div>
        <div class="result-row"><span>JioMart</span><strong>₹1479</strong></div>
      </div>
    </section>
  </main>
</body>
</html>
