<!-- PricePilot — Week 1 Build -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - PricePilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-[#fbfbff] text-gray-950">
  <!-- Dashboard preview -->
  <nav class="border-b border-gray-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
      <a href="../index.html"><img src="../image.png" alt="PricePilot Logo" class="h-10 w-auto"></a>
      <a href="../search/index.html" class="text-sm font-bold text-violet-600">Search</a>
    </div>
  </nav>
  <main class="mx-auto max-w-7xl px-5 py-10">
    <p class="fade-up text-sm font-bold text-violet-600">Later</p>
    <h1 class="fade-up mt-3 text-5xl font-extrabold tracking-[-0.05em]">Dashboard</h1>
    <div class="mt-8 grid gap-5 md:grid-cols-2 lg:grid-cols-4">
      <div class="dashboard-card"><span>Saved products</span><strong>12</strong></div>
      <div class="dashboard-card"><span>Alerts</span><strong>5</strong></div>
      <div class="dashboard-card"><span>Price history</span><strong>89</strong></div>
      <div class="dashboard-card"><span>Watchlist</span><strong>24</strong></div>
    </div>
  </main>
</body>
</html>
