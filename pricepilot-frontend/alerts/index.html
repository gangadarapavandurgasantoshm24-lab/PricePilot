<!-- PricePilot — Week 1 Build -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Alerts - PricePilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="min-h-screen bg-gray-950 text-white">
  <!-- Alerts page -->
  <main class="flex min-h-screen items-center justify-center px-5 py-12">
    <section class="fade-up w-full max-w-2xl rounded-[2rem] border border-white/10 bg-white/10 p-6 text-center shadow-2xl shadow-violet-950/30 backdrop-blur-2xl sm:p-10">
      <a href="../index.html" class="mb-8 inline-flex justify-center"><img src="../image.png" alt="PricePilot Logo" class="h-12 w-auto rounded-xl bg-white p-1"></a>
      <p class="text-sm font-bold text-violet-300">Notify me when:</p>
      <h1 class="mt-4 text-5xl font-extrabold tracking-[-0.05em]">iPhone 16</h1>
      <p class="mt-5 text-lg text-white/50">drops below</p>
      <p class="mt-3 text-5xl font-extrabold text-green-300">₹65,000</p>
      <form class="mt-8 grid gap-3 sm:grid-cols-[1fr_auto]">
        <label for="email" class="sr-only">Email</label>
        <input id="email" type="email" placeholder="Email" class="min-h-14 rounded-2xl border border-white/10 bg-white px-5 text-gray-950 outline-none transition focus:ring-4 focus:ring-violet-400/30">
        <button class="ripple rounded-2xl bg-violet-600 px-7 py-4 text-sm font-bold text-white transition-all duration-200 hover:bg-violet-500 active:scale-[0.97]">Create Alert</button>
      </form>
    </section>
  </main>
</body>
</html>
